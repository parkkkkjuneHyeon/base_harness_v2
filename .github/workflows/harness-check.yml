# 이 워크플로우는 로컬 훅(core.hooksPath)을 설정하지 않은 팀원의 커밋도 원격에서 잡기 위한 최소 검사입니다.
# 로컬 검사(.githooks/pre-commit)와 검사 항목을 맞춰야 합니다.

name: harness-check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install pyyaml
      - name: hooks py_compile
        run: for f in .claude/hooks/*.py; do python -m py_compile "$f"; done
      - name: settings.json validation
        run: python -c "import json; json.load(open('.claude/settings.json'))"
      - name: project.yaml validation
        run: python -c "import yaml; yaml.safe_load(open('.claude/project.yaml'))"
      - name: shell script syntax check
        run: bash -n .githooks/pre-commit && bash -n .claude/hooks/_pyrun.sh
